<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0052A3">
  <title>Results - Siadeel Water</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f7fa; --bg2: #e9ecf1; --shadow-d: #c8d1dc; --shadow-l: #ffffff;
      --text: #0052A3; --text2: #5a6c7d; --text3: #8b98a5;
      --blue: #0052A3; --blue-d: #003d7a; --blue-l: #1a6bbf; --card: #f5f7fa;
      --red: #e74c3c; --red-d: #c0392b; --green: #27ae60; --green-d: #229954;
      --neu-out: 8px 8px 16px var(--shadow-d), -6px -6px 12px var(--shadow-l);
      --neu-in:  inset 5px 5px 10px var(--shadow-d), inset -4px -4px 9px var(--shadow-l);
      --neu-sm:  5px 5px 10px var(--shadow-d), -4px -4px 8px var(--shadow-l);
      --neu-xs:  3px 3px 7px var(--shadow-d), -2px -2px 6px var(--shadow-l);
    }
    body.dark {
      --bg: #1a1f2e; --bg2: #232a3a; --shadow-d: #0f1219; --shadow-l: #2e3547;
      --text: #1a6bbf; --text2: #8b98a5; --text3: #5a6c7d; --card: #1a1f2e;
      --neu-out: 6px 6px 14px var(--shadow-d), -4px -4px 10px var(--shadow-l);
      --neu-in:  inset 5px 5px 10px var(--shadow-d), inset -4px -4px 9px var(--shadow-l);
      --neu-sm:  5px 5px 10px var(--shadow-d), -4px -4px 8px var(--shadow-l);
      --neu-xs:  3px 3px 8px var(--shadow-d), -2px -2px 7px var(--shadow-l);
    }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent }
    html,body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; transition:background 0.4s,color 0.4s }
    
    .results-page { display:flex; flex-direction:column; height:100dvh; width:100%; }
    
    .results-header {
      background:#0052A3;
      padding:14px 18px;
      padding-top:calc(env(safe-area-inset-top,0px) + 14px);
      display:flex;
      align-items:center;
      justify-content:space-between;
      box-shadow:0 3px 10px rgba(0,0,0,0.15);
      position:relative;
      overflow:hidden;
      z-index:10;
    }
    #header-wave-canvas {
      position:absolute; top:0; left:0; width:100%; height:100%;
      pointer-events:none; z-index:1; opacity:0.3;
    }
    .results-back {
      width:36px; height:36px; border-radius:10px;
      background:rgba(255,255,255,0.15); border:none;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:background 0.2s; color:white;
      position:relative; z-index:2;
    }
    .results-back:active { background:rgba(255,255,255,0.25); }
    .results-header h1 {
      font-size:20px; font-weight:700; color:white;
      letter-spacing:0.5px; position:relative; z-index:2;
    }
    .add-btn {
      width:36px; height:36px; border-radius:10px;
      background:rgba(255,255,255,0.15); border:none;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:background 0.2s; color:white;
      position:relative; z-index:2; font-size:24px; font-weight:300;
    }
    .add-btn:active { background:rgba(255,255,255,0.25); }
    
    .results-content {
      flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
      padding:20px 18px; padding-bottom:calc(40px + env(safe-area-inset-bottom,0px));
    }
    
    .calendar-card {
      background:var(--bg); border-radius:18px;
      box-shadow:var(--neu-out); padding:20px; margin-bottom:20px;
    }
    .calendar-header {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:20px;
    }
    .calendar-month {
      font-size:18px; font-weight:700; color:var(--text);
    }
    .calendar-nav {
      display:flex; gap:10px;
    }
    .calendar-nav button {
      width:32px; height:32px; border-radius:8px;
      background:var(--bg); border:none; box-shadow:var(--neu-xs);
      color:var(--text); cursor:pointer; font-size:16px;
      transition:box-shadow 0.15s, transform 0.1s;
    }
    .calendar-nav button:active {
      box-shadow:var(--neu-in); transform:scale(0.95);
    }
    .calendar-weekdays {
      display:grid; grid-template-columns:repeat(7, 1fr);
      gap:8px; margin-bottom:8px;
    }
    .calendar-weekday {
      text-align:center; font-size:11px; font-weight:600;
      color:var(--text3); text-transform:uppercase;
      letter-spacing:0.5px; padding:8px 0;
    }
    .calendar-days {
      display:grid; grid-template-columns:repeat(7, 1fr);
      gap:8px;
    }
    .calendar-day {
      aspect-ratio:1; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      background:var(--bg); border-radius:12px;
      box-shadow:var(--neu-xs); cursor:pointer;
      transition:box-shadow 0.15s, transform 0.1s;
      position:relative; font-size:14px; font-weight:500;
      color:var(--text2);
    }
    .calendar-day:active {
      box-shadow:var(--neu-in); transform:scale(0.95);
    }
    .calendar-day.today {
      color:var(--blue); font-weight:700;
      box-shadow:var(--neu-sm);
    }
    .calendar-day.has-entry::after {
      content:'🧪'; position:absolute; top:2px; right:2px;
      font-size:10px;
    }
    .calendar-day.other-month {
      opacity:0.3; pointer-events:none;
    }
    .calendar-day.selected {
      box-shadow:var(--neu-in);
      background:linear-gradient(135deg, var(--blue-l), var(--blue));
      color:white;
    }
    
    .entry-weather {
      display:flex; flex-direction:column; gap:12px;
      background:var(--bg); border-radius:12px;
      box-shadow:var(--neu-xs); padding:16px;
      margin-bottom:16px;
    }

    .weather-main {
      display:flex; align-items:center; gap:12px;
    }

    .weather-icon-box {
      width:60px; height:60px; border-radius:12px;
      background:var(--bg); box-shadow:var(--neu-sm);
      display:flex; align-items:center; justify-content:center;
      font-size:32px;
    }

    .weather-primary {
      flex:1;
    }

    .weather-condition {
      font-size:16px; font-weight:700; color:var(--text);
      margin-bottom:4px;
    }

    .weather-temp {
      font-size:24px; font-weight:700; color:var(--blue);
      line-height:1;
    }

    .weather-feels {
      font-size:11px; color:var(--text3); margin-top:4px;
    }

    .weather-details {
      display:grid; grid-template-columns:1fr 1fr; gap:10px;
      padding-top:12px; border-top:1px solid var(--shadow-d);
    }

    .weather-detail-item {
      display:flex; align-items:center; gap:8px;
    }

    .weather-detail-icon {
      width:24px; height:24px; border-radius:6px;
      background:var(--bg); box-shadow:var(--neu-xs);
      display:flex; align-items:center; justify-content:center;
      font-size:12px; flex-shrink:0;
    }

    .weather-detail-info {
      flex:1;
    }

    .weather-detail-label {
      font-size:9px; font-weight:600; letter-spacing:0.5px;
      text-transform:uppercase; color:var(--text3);
    }

    .weather-detail-value {
      font-size:13px; font-weight:600; color:var(--text2);
    }
    .entry-actions {
      display:flex; gap:10px; margin-bottom:16px;
    }
    .entry-btn {
      flex:1; padding:12px; border:none; border-radius:12px;
      font-size:14px; font-weight:600; cursor:pointer;
      transition:transform 0.1s, box-shadow 0.15s;
      font-family:'Inter',sans-serif;
    }
    .entry-btn.edit {
      background:var(--bg); color:var(--blue);
      box-shadow:var(--neu-sm);
    }
    .entry-btn.edit:active {
      box-shadow:var(--neu-in); transform:scale(0.98);
    }
    .entry-btn.delete {
      background:var(--red); color:white;
      box-shadow:0 4px 12px rgba(231,76,60,0.3);
    }
    .entry-btn.delete:active {
      background:var(--red-d); transform:scale(0.98);
    }
    
    .entry-grid {
      display:grid; grid-template-columns:1fr 1fr; gap:12px;
      margin-bottom:16px;
    }
    .entry-item {
      background:var(--bg); border-radius:12px;
      box-shadow:var(--neu-xs); padding:12px;
    }
    .entry-label {
      font-size:10px; font-weight:600; letter-spacing:1px;
      text-transform:uppercase; color:var(--text3); margin-bottom:4px;
    }
    .entry-value {
      font-size:18px; font-weight:700; color:var(--blue);
    }
    .entry-image {
      width:100%; border-radius:12px; margin-top:12px;
      box-shadow:var(--neu-sm);
    }
    
    .modal {
      position:fixed; top:0; left:0; right:0; bottom:0;
      background:rgba(0,0,0,0.5); z-index:100;
      display:none; align-items:flex-end; justify-content:center;
    }
    .modal.show { display:flex; }
    .modal-content {
      background:var(--bg); border-radius:28px 28px 0 0;
      width:100%; max-height:85vh; overflow-y:auto;
      padding:24px; padding-bottom:calc(24px + env(safe-area-inset-bottom,0px));
      box-shadow:0 -8px 32px rgba(0,0,0,0.2);
      animation:slideUp 0.3s cubic-bezier(0.16,1,0.3,1);
    }
    @keyframes slideUp {
      from { transform:translateY(100%); }
      to { transform:translateY(0); }
    }
    .modal-header {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:20px;
    }
    .modal-title {
      font-size:20px; font-weight:700; color:var(--text);
    }
    .modal-close {
      width:32px; height:32px; border-radius:8px;
      background:var(--bg); border:none; box-shadow:var(--neu-xs);
      color:var(--text); cursor:pointer; font-size:20px;
    }
    .form-group {
      margin-bottom:16px;
    }
    .form-label {
      font-size:12px; font-weight:600; color:var(--text2);
      margin-bottom:8px; display:block;
    }
    .form-input, .form-select {
      width:100%; padding:14px; background:var(--bg);
      border:none; border-radius:12px; box-shadow:var(--neu-in);
      font-size:14px; color:var(--text); font-family:'Inter',sans-serif;
      outline:none;
    }
    .form-input:focus, .form-select:focus {
      box-shadow:var(--neu-in), 0 0 0 2px var(--blue-l);
    }
    
    .sample-point-group {
      display:flex; gap:10px; align-items:flex-end;
    }
    .sample-point-group .form-group {
      flex:1; margin-bottom:0;
    }
    .manage-points-btn {
      padding:14px 16px; background:var(--bg);
      border:none; border-radius:12px; box-shadow:var(--neu-sm);
      color:var(--blue); cursor:pointer; font-size:14px;
      font-weight:600; white-space:nowrap;
      transition:box-shadow 0.15s, transform 0.1s;
      font-family:'Inter',sans-serif;
    }
    .manage-points-btn:active {
      box-shadow:var(--neu-in); transform:scale(0.98);
    }
    
    .points-list {
      max-height:400px; overflow-y:auto;
      margin-bottom:16px;
    }
    .point-item {
      background:var(--bg); border-radius:12px;
      box-shadow:var(--neu-xs); padding:14px;
      margin-bottom:10px; display:flex;
      align-items:center; justify-content:space-between;
    }
    .point-info {
      flex:1;
    }
    .point-name {
      font-size:15px; font-weight:600; color:var(--text);
      margin-bottom:4px;
    }
    .point-desc {
      font-size:12px; color:var(--text3);
    }
    .point-actions {
      display:flex; gap:8px;
    }
    .point-action-btn {
      width:32px; height:32px; border-radius:8px;
      border:none; display:flex; align-items:center;
      justify-content:center; cursor:pointer;
      transition:transform 0.1s;
      font-size:16px;
    }
    .point-action-btn.edit {
      background:var(--bg); color:var(--blue);
      box-shadow:var(--neu-xs);
    }
    .point-action-btn.delete {
      background:var(--red); color:white;
      box-shadow:0 2px 6px rgba(231,76,60,0.3);
    }
    .point-action-btn:active {
      transform:scale(0.95);
    }
    
    .add-point-btn {
      width:100%; padding:14px; background:var(--green);
      border:none; border-radius:12px; color:white;
      font-size:14px; font-weight:600; cursor:pointer;
      box-shadow:0 4px 12px rgba(39,174,96,0.3);
      transition:transform 0.1s;
      font-family:'Inter',sans-serif;
    }
    .add-point-btn:active {
      background:var(--green-d); transform:scale(0.98);
    }
    
    .image-upload {
      width:100%; padding:40px; background:var(--bg);
      border:2px dashed var(--shadow-d); border-radius:12px;
      text-align:center; cursor:pointer; transition:border-color 0.2s;
    }
    .image-upload:hover { border-color:var(--blue); }
    .image-preview {
      width:100%; max-height:200px; object-fit:cover;
      border-radius:12px; margin-top:12px; display:none;
    }
    .image-preview.show { display:block; }
    .submit-btn {
      width:100%; padding:16px; background:var(--blue);
      border:none; border-radius:14px; color:white;
      font-size:15px; font-weight:600; cursor:pointer;
      box-shadow:0 4px 12px rgba(0,82,163,0.3);
      transition:transform 0.1s;
    }
    .submit-btn:active { transform:scale(0.98); }
    
    .confirm-modal {
      position:fixed; top:0; left:0; right:0; bottom:0;
      background:rgba(0,0,0,0.6); z-index:150;
      display:none; align-items:center; justify-content:center;
      padding:20px;
    }
    .confirm-modal.show { display:flex; }
    .confirm-content {
      background:var(--bg); border-radius:18px;
      padding:24px; max-width:320px; width:100%;
      box-shadow:0 8px 32px rgba(0,0,0,0.3);
      animation:popIn 0.2s cubic-bezier(0.16,1,0.3,1);
    }
    @keyframes popIn {
      from { transform:scale(0.9); opacity:0; }
      to { transform:scale(1); opacity:1; }
    }
    .confirm-title {
      font-size:18px; font-weight:700; color:var(--text);
      margin-bottom:12px;
    }
    .confirm-message {
      font-size:14px; color:var(--text2); line-height:1.6;
      margin-bottom:20px;
    }
    .confirm-actions {
      display:flex; gap:10px;
    }
    .confirm-btn {
      flex:1; padding:12px; border:none; border-radius:12px;
      font-size:14px; font-weight:600; cursor:pointer;
      transition:transform 0.1s;
      font-family:'Inter',sans-serif;
    }
    .confirm-btn.cancel {
      background:var(--bg); color:var(--text);
      box-shadow:var(--neu-sm);
    }
    .confirm-btn.cancel:active {
      box-shadow:var(--neu-in); transform:scale(0.98);
    }
    .confirm-btn.confirm {
      background:var(--red); color:white;
      box-shadow:0 4px 12px rgba(231,76,60,0.3);
    }
    .confirm-btn.confirm:active {
      background:var(--red-d); transform:scale(0.98);
    }
    
    .toast {
      position:fixed; bottom:calc(30px + env(safe-area-inset-bottom,0px));
      left:50%; transform:translateX(-50%); background:var(--bg);
      border-radius:14px; box-shadow:var(--neu-out);
      border-left:4px solid var(--blue); padding:14px 24px;
      font-size:13px; font-weight:500; color:var(--text);
      z-index:300; white-space:nowrap; opacity:0;
      pointer-events:none; transition:opacity 0.3s; max-width:90%;
    }
    .toast.show { opacity:1; }
  </style>
</head>
<body>
  <div class="results-page">
    <div class="results-header">
      <canvas id="header-wave-canvas"></canvas>
      <button class="results-back" onclick="goBack()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <h1>Test Results</h1>
      <button class="add-btn" onclick="openAddModal()">+</button>
    </div>

    <div class="results-content">
      <div class="calendar-card">
        <div class="calendar-header">
          <div class="calendar-month" id="calendar-month">January 2024</div>
          <div class="calendar-nav">
            <button onclick="prevMonth()">‹</button>
            <button onclick="nextMonth()">›</button>
          </div>
        </div>
        <div class="calendar-weekdays">
          <div class="calendar-weekday">Sun</div>
          <div class="calendar-weekday">Mon</div>
          <div class="calendar-weekday">Tue</div>
          <div class="calendar-weekday">Wed</div>
          <div class="calendar-weekday">Thu</div>
          <div class="calendar-weekday">Fri</div>
          <div class="calendar-weekday">Sat</div>
        </div>
        <div class="calendar-days" id="calendar-days"></div>
      </div>

      <!-- ✅ TAMA: Only this div, JavaScript will fill it dynamically -->
      <div id="entry-details"></div>

    </div>
  </div>

  <!-- Add/Edit Entry Modal -->
  <div class="modal" id="add-modal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title" id="modal-title">New Test Entry</div>
        <button class="modal-close" onclick="closeAddModal()">×</button>
      </div>
      
      <form id="entry-form" onsubmit="submitEntry(event)">
        <input type="hidden" id="edit-row-index" value="">
        
        <div class="form-group">
          <label class="form-label">Date</label>
          <input type="date" class="form-input" id="input-date" required>
        </div>
        
        <div class="sample-point-group">
          <div class="form-group" style="flex:1">
            <label class="form-label">Sample Point</label>
            <select class="form-select" id="input-point" required>
              <option value="">Select sample point...</option>
            </select>
          </div>
          <button type="button" class="manage-points-btn" onclick="openManagePointsModal()">⚙️ Manage</button>
        </div>
        
        <div class="form-group">
          <label class="form-label">Description</label>
          <input type="text" class="form-input" id="input-desc" placeholder="Location details">
        </div>
        
        <div class="form-group">
          <label class="form-label">pH</label>
          <input type="number" step="0.01" class="form-input" id="input-ph" placeholder="7.0">
        </div>
        
        <div class="form-group">
          <label class="form-label">Conductivity (µS/cm)</label>
          <input type="number" step="0.01" class="form-input" id="input-conductivity">
        </div>
        
        <div class="form-group">
          <label class="form-label">Free Chlorine (mg/L)</label>
          <input type="number" step="0.01" class="form-input" id="input-chlorine">
        </div>
        
        <div class="form-group">
          <label class="form-label">Iron (mg/L)</label>
          <input type="number" step="0.01" class="form-input" id="input-iron">
        </div>
        
        <div class="form-group">
          <label class="form-label">Hardness (mg/L CaCO₃)</label>
          <input type="number" step="0.01" class="form-input" id="input-hardness">
        </div>
        
        <div class="form-group">
          <label class="form-label">Turbidity (NTU)</label>
          <input type="number" step="0.01" class="form-input" id="input-turbidity">
        </div>
        
        <div class="form-group">
          <label class="form-label">Photo (Optional)</label>
          <input type="file" id="input-image" accept="image/*" style="display:none" onchange="previewImage(event)">
          <div class="image-upload" onclick="document.getElementById('input-image').click()">
            📷 Tap to add photo
          </div>
          <img class="image-preview" id="image-preview" src="" alt="">
        </div>
        
        <button type="submit" class="submit-btn" id="submit-btn">Save Entry</button>
      </form>
    </div>
  </div>

  <!-- Manage Sample Points Modal -->
  <div class="modal" id="manage-points-modal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title">Manage Sample Points</div>
        <button class="modal-close" onclick="closeManagePointsModal()">×</button>
      </div>
      
      <div class="points-list" id="points-list"></div>
      
      <button class="add-point-btn" onclick="openAddPointModal()">+ Add New Sample Point</button>
    </div>
  </div>

  <!-- Add/Edit Sample Point Modal -->
  <div class="modal" id="add-point-modal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title" id="point-modal-title">Add Sample Point</div>
        <button class="modal-close" onclick="closeAddPointModal()">×</button>
      </div>
      
      <form id="point-form" onsubmit="submitSamplePoint(event)">
        <input type="hidden" id="edit-point-row-index" value="">
        
        <div class="form-group">
          <label class="form-label">Name *</label>
          <input type="text" class="form-input" id="point-name" placeholder="e.g., Tank 1" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">Description</label>
          <input type="text" class="form-input" id="point-description" placeholder="Location or details">
        </div>
        
        <button type="submit" class="submit-btn" id="point-submit-btn">Save Sample Point</button>
      </form>
    </div>
  </div>

  <!-- Confirm Delete Modal -->
  <div class="confirm-modal" id="confirm-modal">
    <div class="confirm-content">
