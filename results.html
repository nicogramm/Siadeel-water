<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0052A3">
  <title>Results - Siadeel Water</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f7fa; --bg2: #e9ecf1; --shadow-d: #c8d1dc; --shadow-l: #ffffff;
      --text: #0052A3; --text2: #5a6c7d; --text3: #8b98a5;
      --blue: #0052A3; --blue-d: #003d7a; --blue-l: #1a6bbf; --card: #f5f7fa;
      --red: #e74c3c; --red-d: #c0392b;
      --neu-out: 8px 8px 16px var(--shadow-d), -6px -6px 12px var(--shadow-l);
      --neu-in:  inset 5px 5px 10px var(--shadow-d), inset -4px -4px 9px var(--shadow-l);
      --neu-sm:  5px 5px 10px var(--shadow-d), -4px -4px 8px var(--shadow-l);
      --neu-xs:  3px 3px 7px var(--shadow-d), -2px -2px 6px var(--shadow-l);
    }
    body.dark {
      --bg: #1a1f2e; --bg2: #232a3a; --shadow-d: #0f1219; --shadow-l: #2e3547;
      --text: #1a6bbf; --text2: #8b98a5; --text3: #5a6c7d; --card: #1a1f2e;
      --neu-out: 6px 6px 14px var(--shadow-d), -4px -4px 10px var(--shadow-l);
      --neu-in:  inset 5px 5px 10px var(--shadow-d), inset -4px -4px 9px var(--shadow-l);
      --neu-sm:  5px 5px 10px var(--shadow-d), -4px -4px 8px var(--shadow-l);
      --neu-xs:  3px 3px 8px var(--shadow-d), -2px -2px 7px var(--shadow-l);
    }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent }
    html,body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; transition:background 0.4s,color 0.4s }
    
    .results-page { display:flex; flex-direction:column; height:100dvh; width:100%; }
    
    .results-header {
      background:#0052A3;
      padding:14px 18px;
      padding-top:calc(env(safe-area-inset-top,0px) + 14px);
      display:flex;
      align-items:center;
      justify-content:space-between;
      box-shadow:0 3px 10px rgba(0,0,0,0.15);
      position:relative;
      overflow:hidden;
      z-index:10;
    }
    #header-wave-canvas {
      position:absolute; top:0; left:0; width:100%; height:100%;
      pointer-events:none; z-index:1; opacity:0.3;
    }
    .results-back {
      width:36px; height:36px; border-radius:10px;
      background:rgba(255,255,255,0.15); border:none;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:background 0.2s; color:white;
      position:relative; z-index:2;
    }
    .results-back:active { background:rgba(255,255,255,0.25); }
    .results-header h1 {
      font-size:20px; font-weight:700; color:white;
      letter-spacing:0.5px; position:relative; z-index:2;
    }
    .add-btn {
      width:36px; height:36px; border-radius:10px;
      background:rgba(255,255,255,0.15); border:none;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:background 0.2s; color:white;
      position:relative; z-index:2; font-size:24px; font-weight:300;
    }
    .add-btn:active { background:rgba(255,255,255,0.25); }
    
    .results-content {
      flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
      padding:20px 18px; padding-bottom:calc(40px + env(safe-area-inset-bottom,0px));
    }
    
    .calendar-card {
      background:var(--bg); border-radius:18px;
      box-shadow:var(--neu-out); padding:20px; margin-bottom:20px;
    }
    .calendar-header {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:20px;
    }
    .calendar-month {
      font-size:18px; font-weight:700; color:var(--text);
    }
    .calendar-nav {
      display:flex; gap:10px;
    }
    .calendar-nav button {
      width:32px; height:32px; border-radius:8px;
      background:var(--bg); border:none; box-shadow:var(--neu-xs);
      color:var(--text); cursor:pointer; font-size:16px;
      transition:box-shadow 0.15s, transform 0.1s;
    }
    .calendar-nav button:active {
      box-shadow:var(--neu-in); transform:scale(0.95);
    }
    .calendar-weekdays {
      display:grid; grid-template-columns:repeat(7, 1fr);
      gap:8px; margin-bottom:8px;
    }
    .calendar-weekday {
      text-align:center; font-size:11px; font-weight:600;
      color:var(--text3); text-transform:uppercase;
      letter-spacing:0.5px; padding:8px 0;
    }
    .calendar-days {
      display:grid; grid-template-columns:repeat(7, 1fr);
      gap:8px;
    }
    .calendar-day {
      aspect-ratio:1; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      background:var(--bg); border-radius:12px;
      box-shadow:var(--neu-xs); cursor:pointer;
      transition:box-shadow 0.15s, transform 0.1s;
      position:relative; font-size:14px; font-weight:500;
      color:var(--text2);
    }
    .calendar-day:active {
      box-shadow:var(--neu-in); transform:scale(0.95);
    }
    .calendar-day.today {
      color:var(--blue); font-weight:700;
      box-shadow:var(--neu-sm);
    }
    .calendar-day.has-entry::after {
      content:'🧪'; position:absolute; top:2px; right:2px;
      font-size:10px;
    }
    .calendar-day.other-month {
      opacity:0.3; pointer-events:none;
    }
    .calendar-day.selected {
      box-shadow:var(--neu-in);
      background:linear-gradient(135deg, var(--blue-l), var(--blue));
      color:white;
    }
    
    .entry-details {
      background:var(--bg); border-radius:18px;
      box-shadow:var(--neu-out); padding:20px;
      display:none;
    }
    .entry-details.show { display:block; }
    .entry-header {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:16px; padding-bottom:16px;
      border-bottom:1px solid var(--shadow-d);
    }
    .entry-date {
      font-size:16px; font-weight:700; color:var(--text);
    }
    .entry-weather {
      display:flex; align-items:center; gap:8px;
      font-size:13px; color:var(--text2);
    }
    
    /* ✅ BAGO: Entry actions (Edit & Delete buttons) */
    .entry-actions {
      display:flex; gap:10px; margin-bottom:16px;
    }
    .entry-btn {
      flex:1; padding:12px; border:none; border-radius:12px;
      font-size:14px; font-weight:600; cursor:pointer;
      transition:transform 0.1s, box-shadow 0.15s;
      font-family:'Inter',sans-serif;
    }
    .entry-btn.edit {
      background:var(--bg); color:var(--blue);
      box-shadow:var(--neu-sm);
    }
    .entry-btn.edit:active {
      box-shadow:var(--neu-in); transform:scale(0.98);
    }
    .entry-btn.delete {
      background:var(--red); color:white;
      box-shadow:0 4px 12px rgba(231,76,60,0.3);
    }
    .entry-btn.delete:active {
      background:var(--red-d); transform:scale(0.98);
    }
    
    .entry-grid {
      display:grid; grid-template-columns:1fr 1fr; gap:12px;
      margin-bottom:16px;
    }
    .entry-item {
      background:var(--bg); border-radius:12px;
      box-shadow:var(--neu-xs); padding:12px;
    }
    .entry-label {
      font-size:10px; font-weight:600; letter-spacing:1px;
      text-transform:uppercase; color:var(--text3); margin-bottom:4px;
    }
    .entry-value {
      font-size:18px; font-weight:700; color:var(--blue);
    }
    .entry-image {
      width:100%; border-radius:12px; margin-top:12px;
      box-shadow:var(--neu-sm);
    }
    
    .modal {
      position:fixed; top:0; left:0; right:0; bottom:0;
      background:rgba(0,0,0,0.5); z-index:100;
      display:none; align-items:flex-end; justify-content:center;
    }
    .modal.show { display:flex; }
    .modal-content {
      background:var(--bg); border-radius:28px 28px 0 0;
      width:100%; max-height:85vh; overflow-y:auto;
      padding:24px; padding-bottom:calc(24px + env(safe-area-inset-bottom,0px));
      box-shadow:0 -8px 32px rgba(0,0,0,0.2);
      animation:slideUp 0.3s cubic-bezier(0.16,1,0.3,1);
    }
    @keyframes slideUp {
      from { transform:translateY(100%); }
      to { transform:translateY(0); }
    }
    .modal-header {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:20px;
    }
    .modal-title {
      font-size:20px; font-weight:700; color:var(--text);
    }
    .modal-close {
      width:32px; height:32px; border-radius:8px;
      background:var(--bg); border:none; box-shadow:var(--neu-xs);
      color:var(--text); cursor:pointer; font-size:20px;
    }
    .form-group {
      margin-bottom:16px;
    }
    .form-label {
      font-size:12px; font-weight:600; color:var(--text2);
      margin-bottom:8px; display:block;
    }
    .form-input {
      width:100%; padding:14px; background:var(--bg);
      border:none; border-radius:12px; box-shadow:var(--neu-in);
      font-size:14px; color:var(--text); font-family:'Inter',sans-serif;
      outline:none;
    }
    .form-input:focus {
      box-shadow:var(--neu-in), 0 0 0 2px var(--blue-l);
    }
    .image-upload {
      width:100%; padding:40px; background:var(--bg);
      border:2px dashed var(--shadow-d); border-radius:12px;
      text-align:center; cursor:pointer; transition:border-color 0.2s;
    }
    .image-upload:hover { border-color:var(--blue); }
    .image-preview {
      width:100%; max-height:200px; object-fit:cover;
      border-radius:12px; margin-top:12px; display:none;
    }
    .image-preview.show { display:block; }
    .submit-btn {
      width:100%; padding:16px; background:var(--blue);
      border:none; border-radius:14px; color:white;
      font-size:15px; font-weight:600; cursor:pointer;
      box-shadow:0 4px 12px rgba(0,82,163,0.3);
      transition:transform 0.1s;
    }
    .submit-btn:active { transform:scale(0.98); }
    
    /* ✅ BAGO: Confirm Delete Modal */
    .confirm-modal {
      position:fixed; top:0; left:0; right:0; bottom:0;
      background:rgba(0,0,0,0.6); z-index:150;
      display:none; align-items:center; justify-content:center;
      padding:20px;
    }
    .confirm-modal.show { display:flex; }
    .confirm-content {
      background:var(--bg); border-radius:18px;
      padding:24px; max-width:320px; width:100%;
      box-shadow:0 8px 32px rgba(0,0,0,0.3);
      animation:popIn 0.2s cubic-bezier(0.16,1,0.3,1);
    }
    @keyframes popIn {
      from { transform:scale(0.9); opacity:0; }
      to { transform:scale(1); opacity:1; }
    }
    .confirm-title {
      font-size:18px; font-weight:700; color:var(--text);
      margin-bottom:12px;
    }
    .confirm-message {
      font-size:14px; color:var(--text2); line-height:1.6;
      margin-bottom:20px;
    }
    .confirm-actions {
      display:flex; gap:10px;
    }
    .confirm-btn {
      flex:1; padding:12px; border:none; border-radius:12px;
      font-size:14px; font-weight:600; cursor:pointer;
      transition:transform 0.1s;
      font-family:'Inter',sans-serif;
    }
    .confirm-btn.cancel {
      background:var(--bg); color:var(--text);
      box-shadow:var(--neu-sm);
    }
    .confirm-btn.cancel:active {
      box-shadow:var(--neu-in); transform:scale(0.98);
    }
    .confirm-btn.confirm {
      background:var(--red); color:white;
      box-shadow:0 4px 12px rgba(231,76,60,0.3);
    }
    .confirm-btn.confirm:active {
      background:var(--red-d); transform:scale(0.98);
    }
    
    .toast {
      position:fixed; bottom:calc(30px + env(safe-area-inset-bottom,0px));
      left:50%; transform:translateX(-50%); background:var(--bg);
      border-radius:14px; box-shadow:var(--neu-out);
      border-left:4px solid var(--blue); padding:14px 24px;
      font-size:13px; font-weight:500; color:var(--text);
      z-index:300; white-space:nowrap; opacity:0;
      pointer-events:none; transition:opacity 0.3s; max-width:90%;
    }
    .toast.show { opacity:1; }
  </style>
</head>
<body>
  <div class="results-page">
    <div class="results-header">
      <canvas id="header-wave-canvas"></canvas>
      <button class="results-back" onclick="goBack()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <h1>Test Results</h1>
      <button class="add-btn" onclick="openAddModal()">+</button>
    </div>

    <div class="results-content">
      <div class="calendar-card">
        <div class="calendar-header">
          <div class="calendar-month" id="calendar-month">January 2024</div>
          <div class="calendar-nav">
            <button onclick="prevMonth()">‹</button>
            <button onclick="nextMonth()">›</button>
          </div>
        </div>
        <div class="calendar-weekdays">
          <div class="calendar-weekday">Sun</div>
          <div class="calendar-weekday">Mon</div>
          <div class="calendar-weekday">Tue</div>
          <div class="calendar-weekday">Wed</div>
          <div class="calendar-weekday">Thu</div>
          <div class="calendar-weekday">Fri</div>
          <div class="calendar-weekday">Sat</div>
        </div>
        <div class="calendar-days" id="calendar-days"></div>
      </div>

      <div class="entry-details" id="entry-details">
        <div class="entry-header">
          <div class="entry-date" id="entry-date">—</div>
          <div class="entry-weather" id="entry-weather">
            <span>☀️</span>
            <span>—</span>
          </div>
        </div>
        
        <!-- ✅ BAGO: Edit & Delete buttons -->
        <div class="entry-actions">
          <button class="entry-btn edit" onclick="editCurrentEntry()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="display:inline-block; vertical-align:middle; margin-right:6px;">
              <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Edit
          </button>
          <button class="entry-btn delete" onclick="confirmDelete()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="display:inline-block; vertical-align:middle; margin-right:6px;">
              <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Delete
          </button>
        </div>
        
        <div class="entry-grid" id="entry-grid"></div>
        <img class="entry-image" id="entry-image" src="" alt="">
      </div>
    </div>
  </div>

  <!-- Add/Edit Entry Modal -->
  <div class="modal" id="add-modal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title" id="modal-title">New Test Entry</div>
        <button class="modal-close" onclick="closeAddModal()">×</button>
      </div>
      
      <form id="entry-form" onsubmit="submitEntry(event)">
        <!-- ✅ BAGO: Hidden field for edit mode -->
        <input type="hidden" id="edit-row-index" value="">
        
        <div class="form-group">
          <label class="form-label">Date</label>
          <input type="date" class="form-input" id="input-date" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">Sample Point</label>
          <input type="text" class="form-input" id="input-point" placeholder="e.g., Tank 1" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">Description</label>
          <input type="text" class="form-input" id="input-desc" placeholder="Location details">
        </div>
        
        <div class="form-group">
          <label class="form-label">pH</label>
          <input type="number" step="0.01" class="form-input" id="input-ph" placeholder="7.0">
        </div>
        
        <div class="form-group">
          <label class="form-label">Conductivity (µS/cm)</label>
          <input type="number" step="0.01" class="form-input" id="input-conductivity">
        </div>
        
        <div class="form-group">
          <label class="form-label">Free Chlorine (mg/L)</label>
          <input type="number" step="0.01" class="form-input" id="input-chlorine">
        </div>
        
        <div class="form-group">
          <label class="form-label">Iron (mg/L)</label>
          <input type="number" step="0.01" class="form-input" id="input-iron">
        </div>
        
        <div class="form-group">
          <label class="form-label">Hardness (mg/L CaCO₃)</label>
          <input type="number" step="0.01" class="form-input" id="input-hardness">
        </div>
        
        <div class="form-group">
          <label class="form-label">Turbidity (NTU)</label>
          <input type="number" step="0.01" class="form-input" id="input-turbidity">
        </div>
        
        <div class="form-group">
          <label class="form-label">Photo (Optional)</label>
          <input type="file" id="input-image" accept="image/*" style="display:none" onchange="previewImage(event)">
          <div class="image-upload" onclick="document.getElementById('input-image').click()">
            📷 Tap to add photo
          </div>
          <img class="image-preview" id="image-preview" src="" alt="">
        </div>
        
        <button type="submit" class="submit-btn" id="submit-btn">Save Entry</button>
      </form>
    </div>
  </div>

  <!-- ✅ BAGO: Confirm Delete Modal -->
  <div class="confirm-modal" id="confirm-modal">
    <div class="confirm-content">
      <div class="confirm-title">Delete Entry?</div>
      <div class="confirm-message">
        This will permanently delete this test result. This action cannot be undone.
      </div>
      <div class="confirm-actions">
        <button class="confirm-btn cancel" onclick="closeConfirmModal()">Cancel</button>
        <button class="confirm-btn confirm" onclick="deleteCurrentEntry()">Delete</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ═══════════════════════════════════════
    // CONFIGURATION
    // ═══════════════════════════════════════
    const SHEET_ID = '1-lhBa3FTi_gcFGS1Z0Q9w6yCYoq_BnToI3ZKBl8k8Cs';
    const SHEET_NAME = 'Results';
    const WEATHER_API_KEY = 'Y44692e0366a24e13c3ea18e3ba743cf0'; // ⬅️ Replace with your key from openweathermap.org
    
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();
    let entries = [];
    let selectedDate = null;
    let currentEntry = null; // ✅ BAGO: Track currently displayed entry
    let token = null;
    let isDark = false;

    // ═══════════════════════════════════════
    // THEME SYNC
    // ═══════════════════════════════════════
    const themeChannel = new BroadcastChannel('siadeel-theme-channel');
    themeChannel.onmessage = (event) => {
      if (event.data.type === 'theme-change') {
        applyTheme(event.data.isDark);
      }
    };

    function applyTheme(dark) {
      isDark = dark;
      document.body.classList.toggle('dark', dark);
    }

    applyTheme(localStorage.getItem('siadeel-theme') === 'dark');

    // ═══════════════════════════════════════
    // WAVE ANIMATION
    // ═══════════════════════════════════════
    (function initWaves() {
      const canvas = document.getElementById('header-wave-canvas');
      const ctx = canvas.getContext('2d');
      let animId = null;
      const dpr = Math.max(1, window.devicePixelRatio || 1);

      function resize() {
        const header = canvas.parentElement;
        const W = header.offsetWidth;
        const H = header.offsetHeight;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      const WAVES = [
        { yBase: 0.5, amp1: 3, amp2: 2, freq1: 0.015, freq2: 0.030, speed: 0.3, alpha: 0.15, color: '255,255,255' },
        { yBase: 0.7, amp1: 4, amp2: 2, freq1: 0.012, freq2: 0.025, speed: 0.4, alpha: 0.20, color: '180,230,255' }
      ];

      function loop(ts) {
        const t = ts / 1000;
        const W = canvas.width / dpr;
        const H = canvas.height / dpr;
        ctx.clearRect(0, 0, W, H);

        for (let i = 0; i < WAVES.length; i++) {
          const layer = WAVES[i];
          const yCenter = H * layer.yBase;
          const phase = t * layer.speed;

          ctx.beginPath();
          ctx.moveTo(0, H);
          for (let x = 0; x <= W; x += 2) {
            const y = yCenter
              + Math.sin(x * layer.freq1 + phase * 2.0) * layer.amp1
              + Math.sin(x * layer.freq2 - phase * 1.4) * layer.amp2;
            if (x === 0) ctx.lineTo(0, y);
            else ctx.lineTo(x, y);
          }
          ctx.lineTo(W, H);
          ctx.closePath();
          ctx.fillStyle = 'rgba(' + layer.color + ',' + layer.alpha + ')';
          ctx.fill();
        }

        animId = requestAnimationFrame(loop);
      }

      window.addEventListener('resize', resize);
      resize();
      animId = requestAnimationFrame(loop);
    })();

    // ═══════════════════════════════════════
    // INITIALIZATION
    // ═══════════════════════════════════════
    (function init() {
      token = localStorage.getItem('siadeel-token');
      const expiry = localStorage.getItem('siadeel-token-expiry');
      const bufferMs = 5 * 60 * 1000;
      
      if (!token || !expiry || Date.now() >= (parseInt(expiry) - bufferMs)) {
        showToast('⚠️ Session expired. Redirecting...');
        setTimeout(() => window.location.href = 'index.html', 2000);
        return;
      }
      
      renderCalendar();
      loadEntries();
      document.getElementById('input-date').valueAsDate = new Date();
    })();

    // ═══════════════════════════════════════
    // CALENDAR FUNCTIONS
    // ═══════════════════════════════════════
    function renderCalendar() {
      const firstDay = new Date(currentYear, currentMonth, 1).getDay();
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      const daysInPrevMonth = new Date(currentYear, currentMonth, 0).getDate();
      
      const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
                          'July', 'August', 'September', 'October', 'November', 'December'];
      
      document.getElementById('calendar-month').textContent = `${monthNames[currentMonth]} ${currentYear}`;
      
      const daysContainer = document.getElementById('calendar-days');
      daysContainer.innerHTML = '';
      
      const today = new Date();
      const isCurrentMonth = currentMonth === today.getMonth() && currentYear === today.getFullYear();
      
      for (let i = firstDay - 1; i >= 0; i--) {
        const day = daysInPrevMonth - i;
        const dayEl = document.createElement('div');
        dayEl.className = 'calendar-day other-month';
        dayEl.textContent = day;
        daysContainer.appendChild(dayEl);
      }
      
      for (let day = 1; day <= daysInMonth; day++) {
        const dayEl = document.createElement('div');
        dayEl.className = 'calendar-day';
        dayEl.textContent = day;
        
        const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        
        if (isCurrentMonth && day === today.getDate()) {
          dayEl.classList.add('today');
        }
        
        if (hasEntry(dateStr)) {
          dayEl.classList.add('has-entry');
        }
        
        dayEl.onclick = () => selectDate(dateStr);
        daysContainer.appendChild(dayEl);
      }
      
      const totalCells = daysContainer.children.length;
      const remainingCells = 42 - totalCells;
      for (let day = 1; day <= remainingCells; day++) {
        const dayEl = document.createElement('div');
        dayEl.className = 'calendar-day other-month';
        dayEl.textContent = day;
        daysContainer.appendChild(dayEl);
      }
    }

    function prevMonth() {
      currentMonth--;
      if (currentMonth < 0) {
        currentMonth = 11;
        currentYear--;
      }
      renderCalendar();
    }

    function nextMonth() {
      currentMonth++;
      if (currentMonth > 11) {
        currentMonth = 0;
        currentYear++;
      }
      renderCalendar();
    }

    function hasEntry(dateStr) {
      return entries.some(e => e.Date === dateStr);
    }

    function selectDate(dateStr) {
      selectedDate = dateStr;
      
      document.querySelectorAll('.calendar-day').forEach(day => {
        day.classList.remove('selected');
        if (day.textContent === dateStr.split('-')[2] && !day.classList.contains('other-month')) {
          day.classList.add('selected');
        }
      });
      
      const dayEntries = entries.filter(e => e.Date === dateStr);
      
      if (dayEntries.length > 0) {
        displayEntries(dayEntries);
      } else {
        document.getElementById('entry-details').classList.remove('show');
        showToast('No entries for this date');
      }
    }

    function displayEntries(dayEntries) {
      const entry = dayEntries[0];
      currentEntry = entry; // ✅ BAGO: Store current entry
      
      document.getElementById('entry-date').textContent = new Date(entry.Date).toLocaleDateString('en-US', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });
      
      document.getElementById('entry-weather').innerHTML = `
        <span>${getWeatherIcon(entry['Picture Weather'])}</span>
        <span>${entry['Picture Weather'] || '—'}</span>
      `;
      
      const grid = document.getElementById('entry-grid');
      grid.innerHTML = `
        <div class="entry-item">
          <div class="entry-label">Sample Point</div>
          <div class="entry-value" style="font-size:14px">${entry['Sample Point'] || '—'}</div>
        </div>
        <div class="entry-item">
          <div class="entry-label">pH</div>
          <div class="entry-value">${entry.pH || '—'}</div>
        </div>
        <div class="entry-item">
          <div class="entry-label">Conductivity</div>
          <div class="entry-value" style="font-size:14px">${entry.Conductivity || '—'} µS/cm</div>
        </div>
        <div class="entry-item">
          <div class="entry-label">Free Chlorine</div>
          <div class="entry-value" style="font-size:14px">${entry['Free Chlorine (FRC)'] || '—'} mg/L</div>
        </div>
        <div class="entry-item">
          <div class="entry-label">Iron</div>
          <div class="entry-value" style="font-size:14px">${entry.Iron || '—'} mg/L</div>
        </div>
        <div class="entry-item">
          <div class="entry-label">Hardness</div>
          <div class="entry-value" style="font-size:14px">${entry.Hardness || '—'} mg/L</div>
        </div>
        <div class="entry-item">
          <div class="entry-label">Turbidity</div>
          <div class="entry-value" style="font-size:14px">${entry.Turbidity || '—'} NTU</div>
        </div>
      `;
      
      const imageEl = document.getElementById('entry-image');
      if (entry.Picture) {
        imageEl.src = entry.Picture;
        imageEl.style.display = 'block';
      } else {
        imageEl.style.display = 'none';
      }
      
      document.getElementById('entry-details').classList.add('show');
    }

    function getWeatherIcon(weather) {
      if (!weather) return '☀️';
      const w = weather.toLowerCase();
      if (w.includes('rain')) return '🌧️';
      if (w.includes('cloud')) return '☁️';
      if (w.includes('sun') || w.includes('clear')) return '☀️';
      if (w.includes('storm')) return '⛈️';
      return '☀️';
    }

    // ═══════════════════════════════════════
    // DATA FUNCTIONS
    // ═══════════════════════════════════════
    function loadEntries() {
      if (!token) return;
      
      const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${SHEET_NAME}!A:L`;
      
      fetch(url, {
        headers: { 'Authorization': 'Bearer ' + token }
      })
      .then(r => {
        if (!r.ok) throw new Error(r.status === 401 ? 'Token expired' : 'Network error');
        return r.json();
      })
      .then(data => {
        if (data.values && data.values.length > 1) {
          const headers = data.values[0];
          entries = data.values.slice(1).map((row, index) => {
            const obj = { _rowIndex: index + 2 }; // ✅ BAGO: Store row index (header is row 1)
            headers.forEach((h, i) => {
              obj[h] = row[i] || '';
            });
            return obj;
          });
          renderCalendar();
          showToast(`✅ Loaded ${entries.length} entries`);
        } else {
          showToast('ℹ️ No entries yet');
        }
      })
      .catch(err => {
        console.error('Load entries error:', err);
        if (err.message === 'Token expired') {
          showToast('❌ Session expired');
          setTimeout(() => window.location.href = 'index.html', 2000);
        } else {
          showToast('❌ Failed to load');
        }
      });
    }

    async function submitEntry(event) {
      event.preventDefault();
      
      if (!token) {
        showToast('❌ Not authenticated');
        return;
      }
      
      const date = document.getElementById('input-date').value;
      const point = document.getElementById('input-point').value;
      
      if (!date || !point) {
        showToast('⚠️ Date and Sample Point are required');
        return;
      }
      
      const editRowIndex = document.getElementById('edit-row-index').value;
      const isEditMode = editRowIndex !== '';
      
      showToast(isEditMode ? '⏳ Updating entry...' : '⏳ Saving entry...');
      
      const desc = document.getElementById('input-desc').value;
      const pH = document.getElementById('input-ph').value;
      const conductivity = document.getElementById('input-conductivity').value;
      const chlorine = document.getElementById('input-chlorine').value;
      const iron = document.getElementById('input-iron').value;
      const hardness = document.getElementById('input-hardness').value;
      const turbidity = document.getElementById('input-turbidity').value;
      
      const weather = await getCurrentWeather();
      
      const imageFile = document.getElementById('input-image').files[0];
      let imageUrl = '';
      if (imageFile) {
        imageUrl = await resizeAndUploadImage(imageFile);
      } else if (isEditMode && currentEntry) {
        imageUrl = currentEntry.Picture || ''; // Keep existing image if not changed
      }
      
      const id = isEditMode ? currentEntry.ID : Date.now();
      
      const rowData = [
        id, date, point, desc, pH, conductivity, chlorine, iron, hardness, turbidity, imageUrl, weather
      ];
      
      if (isEditMode) {
        // ✅ UPDATE existing row
        const range = `${SHEET_NAME}!A${editRowIndex}:L${editRowIndex}`;
        const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${range}?valueInputOption=USER_ENTERED`;
        
        fetch(url, {
          method: 'PUT',
          headers: {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            values: [rowData]
          })
        })
        .then(r => r.json())
        .then(data => {
          showToast('✅ Entry updated!');
          closeAddModal();
          loadEntries();
          setTimeout(() => selectDate(date), 500); // Reselect date to refresh display
        })
        .catch(err => {
          console.error('Update error:', err);
          showToast('❌ Failed to update entry');
        });
      } else {
        // ✅ APPEND new row
        const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${SHEET_NAME}!A:L:append?valueInputOption=USER_ENTERED`;
        
        fetch(url, {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            values: [rowData]
          })
        })
        .then(r => r.json())
        .then(data => {
          showToast('✅ Entry saved!');
          closeAddModal();
          loadEntries();
          document.getElementById('entry-form').reset();
        })
        .catch(err => {
          console.error('Save error:', err);
          showToast('❌ Failed to save entry');
        });
      }
    }

    // ✅ BAGO: Edit current entry
    function editCurrentEntry() {
      if (!currentEntry) {
        showToast('⚠️ No entry selected');
        return;
      }
      
      // Populate form with current entry data
      document.getElementById('input-date').value = currentEntry.Date;
      document.getElementById('input-point').value = currentEntry['Sample Point'];
      document.getElementById('input-desc').value = currentEntry.Description || '';
      document.getElementById('input-ph').value = currentEntry.pH || '';
      document.getElementById('input-conductivity').value = currentEntry.Conductivity || '';
      document.getElementById('input-chlorine').value = currentEntry['Free Chlorine (FRC)'] || '';
      document.getElementById('input-iron').value = currentEntry.Iron || '';
      document.getElementById('input-hardness').value = currentEntry.Hardness || '';
      document.getElementById('input-turbidity').value = currentEntry.Turbidity || '';
      
      // Show existing image if available
      if (currentEntry.Picture) {
        const preview = document.getElementById('image-preview');
        preview.src = currentEntry.Picture;
        preview.classList.add('show');
      }
      
      // Set edit mode
      document.getElementById('edit-row-index').value = currentEntry._rowIndex;
      document.getElementById('modal-title').textContent = 'Edit Test Entry';
      document.getElementById('submit-btn').textContent = 'Update Entry';
      
      openAddModal();
    }

    // ✅ BAGO: Confirm delete
    function confirmDelete() {
      if (!currentEntry) {
        showToast('⚠️ No entry selected');
        return;
      }
      document.getElementById('confirm-modal').classList.add('show');
    }

    function closeConfirmModal() {
      document.getElementById('confirm-modal').classList.remove('show');
    }

    // ✅ BAGO: Delete current entry
    function deleteCurrentEntry() {
      if (!currentEntry || !token) return;
      
      closeConfirmModal();
      showToast('⏳ Deleting entry...');
      
      const rowIndex = currentEntry._rowIndex;
      
      // Google Sheets API doesn't have a direct "delete row" endpoint
      // We need to use batchUpdate to delete the row
      const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}:batchUpdate`;
      
      fetch(url, {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + token,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          requests: [
            {
              deleteDimension: {
                range: {
                  sheetId: 0, // ⚠️ Change this if your sheet is not the first one (check Sheet ID in URL)
                  dimension: 'ROWS',
                  startIndex: rowIndex - 1, // 0-indexed
                  endIndex: rowIndex
                }
              }
            }
          ]
        })
      })
      .then(r => {
        if (!r.ok) throw new Error('Delete failed');
        return r.json();
      })
      .then(data => {
        showToast('✅ Entry deleted!');
        document.getElementById('entry-details').classList.remove('show');
        currentEntry = null;
        loadEntries();
      })
      .catch(err => {
        console.error('Delete error:', err);
        showToast('❌ Failed to delete entry');
      });
    }

    // ═══════════════════════════════════════
    // IMAGE FUNCTIONS
    // ═══════════════════════════════════════
    function previewImage(event) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          const preview = document.getElementById('image-preview');
          preview.src = e.target.result;
          preview.classList.add('show');
        };
        reader.readAsDataURL(file);
      }
    }

    async function resizeAndUploadImage(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 600;
            const MAX_HEIGHT = 450;
            
            let width = img.width;
            let height = img.height;
            
            if (width > height) {
              if (width > MAX_WIDTH) {
                height *= MAX_WIDTH / width;
                width = MAX_WIDTH;
              }
            } else {
              if (height > MAX_HEIGHT) {
                width *= MAX_HEIGHT / height;
                height = MAX_HEIGHT;
              }
            }
            
            canvas.width = width;
            canvas.height = height;
            
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            
            const resizedDataUrl = canvas.toDataURL('image/jpeg', 0.7);
            
            if (resizedDataUrl.length > 50000) {
              showToast('⚠️ Image too large, using placeholder');
              resolve('');
            } else {
              resolve(resizedDataUrl);
            }
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    // ═══════════════════════════════════════
    // WEATHER FUNCTIONS
    // ═══════════════════════════════════════
    async function getCurrentWeather() {
      if (!WEATHER_API_KEY || WEATHER_API_KEY === 'YOUR_OPENWEATHER_API_KEY') {
        return 'N/A';
      }
      
      try {
        const position = await new Promise((resolve, reject) => {
          navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 5000 });
        });
        
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        
        const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${WEATHER_API_KEY}&units=metric`;
        
        const response = await fetch(url);
        const data = await response.json();
        
        return `${data.weather[0].main}, ${Math.round(data.main.temp)}°C`;
      } catch (err) {
        console.error('Weather error:', err);
        return 'N/A';
      }
    }

    // ═══════════════════════════════════════
    // UI FUNCTIONS
    // ═══════════════════════════════════════
    function goBack() {
      window.location.href = 'index.html';
    }

    function openAddModal() {
      document.getElementById('add-modal').classList.add('show');
    }

    function closeAddModal() {
      document.getElementById('add-modal').classList.remove('show');
      // Reset form
      document.getElementById('entry-form').reset();
      document.getElementById('edit-row-index').value = '';
      document.getElementById('modal-title').textContent = 'New Test Entry';
      document.getElementById('submit-btn').textContent = 'Save Entry';
      document.getElementById('image-preview').classList.remove('show');
    }

    let toastTimer;
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
    }
  </script>
