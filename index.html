<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Water Systems">
  <meta name="theme-color" content="#0066cc">
  <title>Water Systems</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    /* ═══════════════════════════════════════
       THEME VARIABLES
    ═══════════════════════════════════════ */
    :root {
      /* LIGHT */
      --bg:       #f0f4f8;
      --bg2:      #e8ecf1;
      --shadow-d: #c5d0dd;
      --shadow-l: #ffffff;
      --text:     #1a2332;
      --text2:    #666;
      --text3:    #999;
      --blue:     #0066cc;
      --blue-d:   #004d99;
      --card:     #f0f4f8;

      --neu-out:  6px 6px 14px var(--shadow-d), -4px -4px 10px var(--shadow-l);
      --neu-in:   inset 4px 4px 8px var(--shadow-d), inset -3px -3px 7px var(--shadow-l);
      --neu-sm:   4px 4px 8px var(--shadow-d), -3px -3px 7px var(--shadow-l);
      --neu-xs:   3px 3px 6px var(--shadow-d), -2px -2px 5px var(--shadow-l);
    }

    body.dark {
      --bg:       #1a1f2e;
      --bg2:      #232a3a;
      --shadow-d: #0f1219;
      --shadow-l: #2e3547;
      --text:     #e8ecf1;
      --text2:    #999;
      --text3:    #666;
      --card:     #1a1f2e;

      --neu-out:  5px 5px 12px var(--shadow-d), -3px -3px 9px var(--shadow-l);
      --neu-in:   inset 4px 4px 8px var(--shadow-d), inset -3px -3px 7px var(--shadow-l);
      --neu-sm:   4px 4px 8px var(--shadow-d), -3px -3px 7px var(--shadow-l);
      --neu-xs:   3px 3px 7px var(--shadow-d), -2px -2px 6px var(--shadow-l);
    }

    /* ═══════════════════════════════════════
       BASE
    ═══════════════════════════════════════ */
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent }
    html,body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; transition:background 0.4s,color 0.4s }

    .screen { display:none; flex-direction:column; height:100dvh; width:100%; position:absolute; top:0; left:0 }
    .screen.active { display:flex }

    /* ═══════════════════════════════════════
       LOGIN / WELCOME
    ═══════════════════════════════════════ */
    #s-login {
      background: linear-gradient(135deg, #0066cc 0%, #004d99 100%);
      overflow: hidden;
      justify-content: flex-end;
      position: relative;
    }

    /* ANIMATED WATER DROPS */
    .water-container {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 50%;
      overflow: hidden;
      z-index: 1;
    }

    .water-drop {
      position: absolute;
      width: 8px;
      height: 8px;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 50%;
      animation: dropFall linear infinite;
    }

    @keyframes dropFall {
      0% {
        opacity: 1;
        transform: translateY(-20px);
      }
      90% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translateY(calc(50vh + 20px));
      }
    }

    /* WATER WAVE */
    .water-wave {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 120px;
      background: url('data:image/svg+xml,<svg viewBox="0 0 1200 120" xmlns="http://www.w3.org/2000/svg"><path d="M0,50 Q300,10 600,50 T1200,50 L1200,120 L0,120 Z" fill="rgba(255,255,255,0.1)"/></svg>');
      background-size: 600px 120px;
      background-repeat: repeat-x;
      animation: wave 8s linear infinite;
      z-index: 2;
    }

    @keyframes wave {
      0% { background-position: 0 0; }
      100% { background-position: 600px 0; }
    }

    .water-wave::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url('data:image/svg+xml,<svg viewBox="0 0 1200 120" xmlns="http://www.w3.org/2000/svg"><path d="M0,60 Q300,20 600,60 T1200,60 L1200,120 L0,120 Z" fill="rgba(255,255,255,0.15)"/></svg>');
      background-size: 600px 120px;
      background-repeat: repeat-x;
      animation: wave 6s linear infinite reverse;
    }

    /* PIPE ANIMATION */
    .pipe-stage {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 3;
      text-align: center;
    }

    .pipe-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      opacity: 0;
      animation: pipeIn 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 0.5s;
    }

    @keyframes pipeIn {
      0% {
        opacity: 0;
        transform: scale(0.5);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    .pipe-text {
      color: white;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      opacity: 0;
      animation: textIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 1s;
    }

    .pipe-sub {
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
      opacity: 0;
      animation: textIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 1.3s;
    }

    @keyframes textIn {
      0% {
        opacity: 0;
        transform: translateY(10px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* LOGIN CARD */
    .login-card {
      position: relative;
      z-index: 4;
      width: 100%;
      background: var(--bg);
      border-radius: 28px 28px 0 0;
      padding: 32px 28px calc(44px + env(safe-area-inset-bottom, 0px));
      opacity: 0;
      transform: translateY(50px);
      animation: cardUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 2.5s;
    }

    @keyframes cardUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-card h2 {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .login-card p {
      font-size: 14px;
      color: var(--text2);
      line-height: 1.65;
      margin-bottom: 28px;
    }

    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 15px 20px;
      background: var(--bg);
      color: var(--text);
      border: none;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      box-shadow: var(--neu-out);
      transition: box-shadow 0.15s;
    }

    .google-btn:active {
      box-shadow: var(--neu-in);
    }

    .google-btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    /* ═══════════════════════════════════════
       APP SHELL
    ═══════════════════════════════════════ */
    #s-app {
      background: var(--bg);
      flex-direction: column;
    }

    /* TOPBAR */
    .topbar {
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      padding-top: calc(env(safe-area-inset-top, 0px) + 14px);
      flex-shrink: 0;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.07);
    }

    body.dark .topbar {
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
    }

    .tb-brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tb-brand-text {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--text);
    }

    .tb-brand-blue {
      color: var(--blue);
    }

    .tb-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .tb-title {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text3);
    }

    .tb-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid var(--blue);
      object-fit: cover;
      box-shadow: var(--neu-xs);
    }

    /* PAGE WRAP */
    .page-wrap {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px;
      padding-bottom: 90px;
    }

    /* ═══════════════════════════════════════
       DASHBOARD
    ═══════════════════════════════════════ */
    .dash-header {
      margin-bottom: 22px;
      padding: 0 2px;
    }

    .dash-eyebrow {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 5px;
    }

    .dash-name {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .dash-date {
      font-size: 12px;
      color: var(--text2);
      margin-top: 4px;
    }

    /* MODULE GRID */
    .mod-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .mod-card {
      background: var(--bg);
      border-radius: 18px;
      box-shadow: var(--neu-out);
      padding: 18px 14px;
      cursor: pointer;
      transition: box-shadow 0.15s, transform 0.1s;
    }

    .mod-card:active {
      box-shadow: var(--neu-in);
      transform: scale(0.98);
    }

    .mod-card.wide {
      grid-column: span 2;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 18px;
    }

    .mod-card.wide .mod-icon-box {
      margin-bottom: 0;
      flex-shrink: 0;
    }

    .mod-card.wide .mod-value {
      font-size: 22px;
    }

    .mod-icon-box {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: var(--bg);
      box-shadow: var(--neu-xs);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }

    .mod-icon-box svg {
      width: 18px;
      height: 18px;
    }

    .mod-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 5px;
    }

    .mod-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--blue);
      line-height: 1;
      letter-spacing: -1px;
    }

    .mod-sub {
      font-size: 10px;
      color: var(--text3);
      margin-top: 2px;
    }

    /* ═══════════════════════════════════════
       BOTTOM NAV
    ═══════════════════════════════════════ */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg);
      padding: 10px 20px calc(10px + env(safe-area-inset-bottom, 0px));
      display: flex;
      align-items: center;
      justify-content: space-around;
      box-shadow: 0 -3px 14px rgba(0, 0, 0, 0.07);
      z-index: 40;
    }

    body.dark .bottom-nav {
      box-shadow: 0 -3px 14px rgba(0, 0, 0, 0.4);
    }

    .bnav {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text3);
      cursor: pointer;
      border: none;
      background: none;
      font-family: 'Inter', sans-serif;
    }

    .bnav.active {
      color: var(--blue);
    }

    .bnav-icon {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: box-shadow 0.2s;
    }

    .bnav:not(.active) .bnav-icon {
      box-shadow: var(--neu-sm);
    }

    .bnav.active .bnav-icon {
      box-shadow: var(--neu-in);
    }

    /* ═══════════════════════════════════════
       TOAST
    ═══════════════════════════════════════ */
    .toast {
      position: fixed;
      bottom: calc(80px + env(safe-area-inset-bottom, 0px));
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg);
      border-radius: 14px;
      box-shadow: var(--neu-out);
      border-left: 3px solid var(--blue);
      padding: 13px 22px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      z-index: 300;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .toast.show {
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- ═══ LOGIN ═══ -->
  <div class="screen active" id="s-login">
    <div class="water-container">
      <div class="water-wave"></div>
    </div>

    <div class="pipe-stage">
      <svg class="pipe-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <!-- Pipe -->
        <rect x="35" y="20" width="30" height="50" rx="5" fill="none" stroke="white" stroke-width="3"/>
        <!-- Water inside -->
        <rect x="37" y="50" width="26" height="20" rx="4" fill="rgba(255,255,255,0.4)"/>
        <!-- Drops -->
        <circle cx="50" cy="75" r="4" fill="rgba(255,255,255,0.8)" opacity="0">
          <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="45" cy="82" r="3" fill="rgba(255,255,255,0.6)" opacity="0">
          <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite" begin="0.3s"/>
        </circle>
        <circle cx="55" cy="82" r="3" fill="rgba(255,255,255,0.6)" opacity="0">
          <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite" begin="0.6s"/>
        </circle>
      </svg>
      <div class="pipe-text">Water Systems</div>
      <div class="pipe-sub">Smart Water Management</div>
    </div>

    <div class="login-card">
      <h2>Welcome Back</h2>
      <p>Sign in with your Google account to access the Water Systems dashboard.</p>
      <button class="google-btn" onclick="signIn()">
        <svg viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>
    </div>
  </div>

  <!-- ═══ DASHBOARD ═══ -->
  <div class="screen" id="s-app">
    <div class="topbar">
      <div class="tb-brand">
        <span style="font-size:20px;">💧</span>
        <span class="tb-brand-text">Water<span class="tb-brand-blue">Systems</span></span>
      </div>
      <div class="tb-right">
        <span class="tb-title">Dashboard</span>
        <img class="tb-avatar" id="user-avatar" src="" alt="">
      </div>
    </div>

    <div class="page-wrap">
      <div class="dash-header">
        <div class="dash-eyebrow">Water Management</div>
        <div class="dash-name" id="dash-name">Good day!</div>
        <div class="dash-date" id="dash-date"></div>
      </div>
      <div class="mod-grid" id="mod-grid"></div>
    </div>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
      <button class="bnav active">
        <div class="bnav-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" stroke="currentColor" stroke-width="2"/>
            <path d="M9 22V12h6v10" stroke="currentColor" stroke-width="2"/>
          </svg>
        </div>
        Home
      </button>
      <button class="bnav" onclick="location.href='meters.html'">
        <div class="bnav-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="2"/>
            <path d="M12 7v5l3.5 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        Meters
      </button>
      <button class="bnav" onclick="location.href='readings.html'">
        <div class="bnav-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        Readings
      </button>
      <button class="bnav" onclick="location.href='billing.html'">
        <div class="bnav-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <rect x="4" y="2" width="16" height="20" rx="2" stroke="currentColor" stroke-width="2"/>
            <path d="M8 7h8M8 11h8M8 15h5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        Billing
      </button>
      <button class="bnav" onclick="location.href='settings.html'">
        <div class="bnav-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
            <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        Settings
      </button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ═══════════════════════════════════════
    // CONFIG
    // ═══════════════════════════════════════
    const CLIENT_ID = '390293022504-q788ime82mdj3fss169oeqbijodkkgon.apps.googleusercontent.com';
    const SHEET_ID = '1-lhBa3FTi_gcFGS1Z0Q9w6yCYoq_BnToI3ZKBl8k8Cs';
    const SCOPES = 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.file openid email profile';

    const ALL_MODULES = [
      {id:'meters',      icon:'droplet',   label:'Meters',       stat:'sv-meters',   sub:'Active meters',   link:'meters.html'},
      {id:'readings',    icon:'chart',     label:'Readings',     stat:'sv-readings', sub:'Latest data',     link:'readings.html'},
      {id:'billing',     icon:'doc',       label:'Billing',      stat:'sv-billing',  sub:'Invoices',        wide:true, link:'billing.html'},
      {id:'settings',    icon:'settings',  label:'Settings',     stat:'sv-set',      sub:'App settings',    wide:true, link:'settings.html'},
    ];

    const ICONS = {
      droplet: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.32 0z" stroke="var(--blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
      chart:   '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12" stroke="var(--blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
      doc:     '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="4" y="2" width="16" height="20" rx="2" stroke="var(--blue)" stroke-width="2"/><path d="M8 7h8M8 11h8M8 15h5" stroke="var(--blue)" stroke-width="2" stroke-linecap="round"/></svg>',
      settings:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="var(--blue)" stroke-width="2"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="var(--blue)" stroke-width="2" stroke-linecap="round"/></svg>',
    };

    let token = null;
    let isDark = false;

    // ═══════════════════════════════════════
    // THEME
    // ═══════════════════════════════════════
    function applyTheme(dark) {
      isDark = dark;
      document.body.classList.toggle('dark', dark);
      localStorage.setItem('water-theme', dark ? 'dark' : 'light');
    }
    applyTheme(localStorage.getItem('water-theme') === 'dark');

    // ═══════════════════════════════════════
    // ANIMATED WATER DROPS
    // ═══════════════════════════════════════
    function createWaterDrops() {
      const container = document.querySelector('.water-container');
      for (let i = 0; i < 8; i++) {
        const drop = document.createElement('div');
        drop.className = 'water-drop';
        drop.style.left = Math.random() * 100 + '%';
        drop.style.animationDuration = (2 + Math.random() * 1.5) + 's';
        drop.style.animationDelay = Math.random() * 2 + 's';
        container.appendChild(drop);
      }
    }

    // ═══════════════════════════════════════
    // INIT
    // ═══════════════════════════════════════
    (function init() {
      createWaterDrops();

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      }

      const savedToken = localStorage.getItem('water-token');
      const expiry = localStorage.getItem('water-token-expiry');
      const bufferMs = 5 * 60 * 1000;

      if (savedToken && expiry && Date.now() < (parseInt(expiry) - bufferMs)) {
        token = savedToken;
        loadUser();
      } else {
        localStorage.removeItem('water-token');
        localStorage.removeItem('water-token-expiry');
        document.getElementById('s-login').classList.add('active');
        document.getElementById('s-app').classList.remove('active');
      }
    })();

    // ═══════════════════════════════════════
    // AUTH
    // ═══════════════════════════════════════
    function signIn() {
      if (typeof google === 'undefined' || !google.accounts) {
        showToast('Loading Google Sign-In...');
        setTimeout(signIn, 800);
        return;
      }

      var hasGranted = localStorage.getItem('water-scope-granted');

      google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: function(res) {
          if (res.error) {
            showToast('❌ Login error: ' + res.error);
            return;
          }

          token = res.access_token;
          const expiresAt = Date.now() + (res.expires_in * 1000);
          localStorage.setItem('water-token', token);
          localStorage.setItem('water-token-expiry', expiresAt);
          localStorage.setItem('water-scope-granted', 'true');

          loadUser();
        }
      }).requestAccessToken({
        prompt: hasGranted ? '' : 'consent'
      });
    }

    function loadUser() {
      fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
        headers: { 'Authorization': 'Bearer ' + token }
      })
      .then(r => {
        if (!r.ok) throw new Error('Auth failed');
        return r.json();
      })
      .then(u => {
        localStorage.setItem('water-name', u.name || '');
        localStorage.setItem('water-email', u.email || '');
        localStorage.setItem('water-picture', u.picture || '');

        document.getElementById('user-avatar').src = u.picture || '';

        document.getElementById('s-login').classList.remove('active');
        document.getElementById('s-app').classList.add('active');

        buildDashboard();
        loadDashboardStats();
        updateGreeting(u.given_name || 'team');
      })
      .catch(function(err) {
        console.error('Load user error:', err);
        localStorage.removeItem('water-token');
        localStorage.removeItem('water-token-expiry');

        document.getElementById('s-login').classList.add('active');
        document.getElementById('s-app').classList.remove('active');

        showToast('❌ Session expired. Please sign in again.');
      });
    }

    function updateGreeting(firstName) {
      var now = new Date();
      var h = now.getHours();
      var gr = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';

      document.getElementById('dash-name').textContent = gr + ', ' + firstName + '!';
      document.getElementById('dash-date').textContent = now.toLocaleDateString('en-PH', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });
    }

    // ═══════════════════════════════════════
    // DASHBOARD
    // ═══════════════════════════════════════
    function buildDashboard() {
      document.getElementById('mod-grid').innerHTML = ALL_MODULES.map(m => {
        const icon = ICONS[m.icon] || '';
        const onclick = m.link ? `location.href='${m.link}'` : '';

        if (m.wide) {
          return `<div class="mod-card wide" onclick="${onclick}">
            <div class="mod-icon-box">${icon}</div>
            <div>
              <div class="mod-label">${m.label}</div>
              <div class="mod-value" id="${m.stat}">—</div>
              <div class="mod-sub">${m.sub}</div>
            </div>
          </div>`;
        }

        return `<div class="mod-card" onclick="${onclick}">
          <div class="mod-icon-box">${icon}</div>
          <div class="mod-label">${m.label}</div>
          <div class="mod-value" id="${m.stat}">—</div>
          <div class="mod-sub">${m.sub}</div>
        </div>`;
      }).join('');
    }

    function loadDashboardStats() {
      if (!token) return;

      // Load Meters
      fetch('https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/Meters!A2:A', {
        headers: { 'Authorization': 'Bearer ' + token }
      })
      .then(r => r.json())
      .then(res => {
        const count = (res.values || []).length;
        const el = document.getElementById('sv-meters');
        if (el) el.textContent = count > 0 ? count : '—';
      })
      .catch(() => {
        const el = document.getElementById('sv-meters');
        if (el) el.textContent = '—';
      });

      // Load Readings
      fetch('https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/Readings!A2:A', {
        headers: { 'Authorization': 'Bearer ' + token }
      })
      .then(r => r.json())
      .then(res => {
        const count = (res.values || []).length;
        const el = document.getElementById('sv-readings');
        if (el) el.textContent = count > 0 ? count : '—';
      })
      .catch(() => {
        const el = document.getElementById('sv-readings');
        if (el) el.textContent = '—';
      });
    }

    // ═══════════════════════════════════════
    // TOAST
    // ═══════════════════════════════════════
    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
    }
  </script>

</body>
</html>
