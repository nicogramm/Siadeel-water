      --neu-out: 8px 8px 16px var(--shadow-d), -6px -6px 12px var(--shadow-l);
      --neu-in:  inset 5px 5px 10px var(--shadow-d), inset -4px -4px 9px var(--shadow-l);
      --neu-sm:  5px 5px 10px var(--shadow-d), -4px -4px 8px var(--shadow-l);
      --neu-xs:  3px 3px 7px var(--shadow-d), -2px -2px 6px var(--shadow-l);
    }
    body.dark {
      --bg: #1a1f2e; --bg2: #232a3a; --shadow-d: #0f1219; --shadow-l: #2e3547;
      --text: #1a6bbf; --text2: #8b98a5; --text3: #5a6c7d; --card: #1a1f2e;
      --neu-out: 6px 6px 14px var(--shadow-d), -4px -4px 10px var(--shadow-l);

      --neu-sm:  5px 5px 10px var(--shadow-d), -4px -4px 8px var(--shadow-l);
      --neu-xs:  3px 3px 8px var(--shadow-d), -2px -2px 7px var(--shadow-l);

    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent }

    // ═══════════════════════════════════════
    // WATER WAVES ANIMATION (Flowing layers)
    // ═══════════════════════════════════════
    (function initWaterWaves() {
      var canvas = document.getElementById('flow-canvas');
      var ctx    = canvas.getContext('2d');
      var animId = null;
      var dpr    = Math.max(1, window.devicePixelRatio || 1);

      function resize() {
        var W = window.innerWidth  || document.documentElement.clientWidth;
        var H = window.innerHeight || document.documentElement.clientHeight;
        canvas.width  = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width  = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      // Multiple wave layers — each acts like a tide of water
      // yBase  = vertical position (0 = top, 1 = bottom)
      // amp    = wave height
      // freq   = wave frequency (smaller = longer waves)
      // speed  = how fast the wave flows
      // alpha  = transparency of the fill
      var WAVE_LAYERS = [
        { yBase: 0.55, amp1: 14, amp2: 6,  freq1: 0.012, freq2: 0.028, speed: 0.35, alpha: 0.10, color: '255,255,255' },
        { yBase: 0.62, amp1: 18, amp2: 8,  freq1: 0.010, freq2: 0.024, speed: 0.45, alpha: 0.13, color: '180,220,255' },
        { yBase: 0.70, amp1: 22, amp2: 10, freq1: 0.009, freq2: 0.022, speed: 0.55, alpha: 0.16, color: '140,200,255' },
        { yBase: 0.78, amp1: 26, amp2: 12, freq1: 0.008, freq2: 0.020, speed: 0.65, alpha: 0.20, color: '100,180,255' },
        { yBase: 0.86, amp1: 30, amp2: 14, freq1: 0.007, freq2: 0.018, speed: 0.75, alpha: 0.26, color: '255,255,255' }
      ];

      function loop(ts) {
        var t = ts / 1000;
        var W = canvas.width  / dpr;
        var H = canvas.height / dpr;
        ctx.clearRect(0, 0, W, H);

        // Draw filled water layers (back to front)
        for (var i = 0; i < WAVE_LAYERS.length; i++) {
          var layer = WAVE_LAYERS[i];
          var yCenter = H * layer.yBase;
          var phase   = t * layer.speed;

          ctx.beginPath();
          ctx.moveTo(0, H);
          for (var x = 0; x <= W; x += 2) {
            var y = yCenter
                  + Math.sin(x * layer.freq1 + phase * 2.0) * layer.amp1
                  + Math.sin(x * layer.freq2 - phase * 1.4) * layer.amp2
                  + Math.sin(x * 0.004 + phase * 0.6) * 4;
            if (x === 0) ctx.lineTo(0, y);
            else         ctx.lineTo(x, y);
          }
          ctx.lineTo(W, H);
          ctx.closePath();
          ctx.fillStyle = 'rgba(' + layer.color + ',' + layer.alpha + ')';
          ctx.fill();
        }

        // Draw highlighted crest lines on top of each layer
        for (var k = 0; k < WAVE_LAYERS.length; k++) {
          var L = WAVE_LAYERS[k];
          var yC = H * L.yBase;
          var ph = t * L.speed;
          ctx.beginPath();
          for (var xx = 0; xx <= W; xx += 2) {
            var yy = yC
                   + Math.sin(xx * L.freq1 + ph * 2.0) * L.amp1
                   + Math.sin(xx * L.freq2 - ph * 1.4) * L.amp2
                   + Math.sin(xx * 0.004 + ph * 0.6) * 4;
            if (xx === 0) ctx.moveTo(xx, yy);
            else          ctx.lineTo(xx, yy);
          }
          ctx.strokeStyle = 'rgba(255,255,255,' + (L.alpha * 1.4) + ')';
          ctx.lineWidth   = 1.2;
          ctx.stroke();
        }

        animId = requestAnimationFrame(loop);
      }

      function start() {
        resize();
        if (animId) cancelAnimationFrame(animId);
        animId = requestAnimationFrame(loop);
      }

      window.addEventListener('resize', resize);
      new MutationObserver(function() {
        var loginScreen = document.getElementById('s-login');
        if (!loginScreen.classList.contains('active')) {
          if (animId) { cancelAnimationFrame(animId); animId = null; }
        } else if (!animId) {
          start();
        }
      }).observe(document.getElementById('s-login'), { attributes: true, attributeFilter: ['class'] });
      setTimeout(start, 60);
    })();

      trend:    '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18" stroke="var(--blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="17 6 23 6 23 12" stroke="var(--blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
      info:     '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="var(--blue)" stroke-width="2"/><path d="M12 16v-4M12 8h.01" stroke="var(--blue)" stroke-width="2" stroke-linecap="round"/></svg>',
      droplet:  '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z" stroke="var(--blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
      filter:   '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3" stroke="var(--blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
      settings: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="var(--blue)" stroke-width="2"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="var(--blue)" stroke-width="2" stroke-linecap="round"/></svg>'
    };
    let token = null, isDark = false;
    function applyTheme(dark) {
      isDark = dark;
      document.body.classList.toggle('dark', dark);
      localStorage.setItem('siadeel-theme', dark ? 'dark' : 'light');
    }
    applyTheme(localStorage.getItem('siadeel-theme') === 'dark');
    (function init() {
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault(); deferredPrompt = e;
        showToast('📲 Tap to install app');
        setTimeout(() => {
          if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((r) => {
              if (r.outcome === 'accepted') showToast('✅ App installed!');
              deferredPrompt = null;
            });
          }
        }, 3000);
      });
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => {
            setInterval(() => reg.update(), 5 * 60 * 1000);
            reg.update();
            reg.addEventListener('updatefound', () => {
              const nw = reg.installing;
              nw.addEventListener('statechange', () => {
                if (nw.state === 'installed' && navigator.serviceWorker.controller) window.location.reload();
              });
            });
          })
          .catch(err => console.error('[App] SW registration failed:', err));
      }
      const savedToken = localStorage.getItem('siadeel-token');
      const expiry     = localStorage.getItem('siadeel-token-expiry');
      const bufferMs   = 5 * 60 * 1000;
      if (!savedToken || !expiry || Date.now() >= (parseInt(expiry) - bufferMs)) {
        localStorage.removeItem('siadeel-token');
        localStorage.removeItem('siadeel-token-expiry');
        document.getElementById('s-login').classList.add('active');
        document.getElementById('s-app').classList.remove('active');
      } else {
        token = savedToken;
        loadUser();
      }
    })();
    function signIn() {
      if (typeof google === 'undefined' || !google.accounts) {
        showToast('Loading Google Sign-In...');
        setTimeout(signIn, 800); return;
      }
      var hasGranted = localStorage.getItem('siadeel-scope-granted');
      google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID, scope: SCOPES,
        callback: function(res) {
          if (res.error) { showToast('❌ Login error: ' + res.error); return; }
          token = res.access_token;
          const expiresAt = Date.now() + (res.expires_in * 1000);
          localStorage.setItem('siadeel-token',         token);
          localStorage.setItem('siadeel-token-expiry',  expiresAt);
          localStorage.setItem('siadeel-scope-granted', 'true');
          loadUser();
        }
      }).requestAccessToken({ prompt: hasGranted ? '' : 'consent' });
    }
    // ═══════════════════════════════════════
// UPDATED: Delayed Dashboard Loading
// ═══════════════════════════════════════

    function loadUser() {
      fetch('https://www.googleapis.com/oauth2/v3/userinfo', { headers: { 'Authorization': 'Bearer ' + token } })
      .then(r => { if (!r.ok) throw new Error('Auth failed'); return r.json(); })
      .then(u => {
        const authorized = AUTHORIZED_USERS.find(au => au.email.toLowerCase() === u.email.toLowerCase());
        if (!authorized) {
          showToast('❌ Access denied. Your account is not authorized.');
          localStorage.removeItem('siadeel-token'); 
          localStorage.removeItem('siadeel-token-expiry');
          document.getElementById('s-login').classList.add('active');
          document.getElementById('s-app').classList.remove('active');
          return;
        }
        
        localStorage.setItem('siadeel-name',    authorized.name);
        localStorage.setItem('siadeel-email',   u.email);
        localStorage.setItem('siadeel-picture', u.picture || '');
        
        // ✅ BAGO: Hintayin ang logo animation (2.5 seconds) bago mag-transition
        const LOGO_ANIMATION_DURATION = 2500; // 1.8s delay + 0.7s animation
        const FULL_WELCOME_DURATION = 4000; // 2.6s delay + 0.55s animation + 50ms buffer
        
        setTimeout(function() {
          document.getElementById('user-avatar').src = u.picture || '';
          document.getElementById('s-login').classList.remove('active');
          document.getElementById('s-app').classList.add('active');
          buildDashboard(); 
          loadDashboardStats(); 
          updateGreeting(authorized.name);
          initPullToRefresh(document.querySelector('.page-wrap'), function(done) { 
            loadDashboardStats(); 
            setTimeout(done, 1000); 
          });
          initAutoRefresh(function(done) { 
            loadDashboardStats(); 
            done(); 
          });
        }, FULL_WELCOME_DURATION);
        
      })
      .catch(function(err) {
        console.error('Load user error:', err);
        localStorage.removeItem('siadeel-token'); 
        localStorage.removeItem('siadeel-token-expiry');
        document.getElementById('s-login').classList.add('active');
        document.getElementById('s-app').classList.remove('active');
        showToast('❌ Session expired. Please sign in again.');
      });
    }
    function updateGreeting(firstName) {
      var now = new Date(), h = now.getHours();
      var gr  = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
      document.getElementById('dash-name').textContent = gr + ', ' + firstName + '!';
      document.getElementById('dash-date').textContent = now.toLocaleDateString('en-PH', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
    }
    function buildDashboard() {
      document.getElementById('mod-grid').innerHTML = ALL_MODULES.map(m => {
        const icon = ICONS[m.icon] || '';
        const onclick = `showToast('${m.label} — coming soon')`;
        if (m.wide) {
          return `<div class="mod-card wide" onclick="${onclick}"><div class="mod-icon-box">${icon}</div><div><div class="mod-label">${m.label}</div><div class="mod-value" id="${m.stat}">—</div><div class="mod-sub">${m.sub}</div></div></div>`;
        }
        return `<div class="mod-card" onclick="${onclick}"><div class="mod-icon-box">${icon}</div><div class="mod-label">${m.label}</div><div class="mod-value" id="${m.stat}">—</div><div class="mod-sub">${m.sub}</div></div>`;
      }).join('');
    }
    function loadDashboardStats() {
      if (!token) return;
      setTimeout(() => {
        document.getElementById('sv-results').textContent   = '24';
        document.getElementById('sv-trends').textContent    = '89%';
        document.getElementById('sv-process').textContent   = '5';
        document.getElementById('sv-quality').textContent   = '98%';
        document.getElementById('sv-treatment').textContent = '3';
        document.getElementById('sv-settings').textContent  = '—';
      }, 500);
    }
    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
    }
    function initPullToRefresh(scrollEl, onRefresh) {
      var startY = 0, pulling = false, threshold = 70;
      var indicator = document.createElement('div');
      indicator.className = 'ptr-indicator';
      indicator.innerHTML = '<div class="ptr-arrow" id="ptr-arrow">↓</div>';
      document.body.appendChild(indicator);
      scrollEl.addEventListener('touchstart', function(e) {
        if (scrollEl.scrollTop === 0) { startY = e.touches[0].clientY; pulling = true; }
      }, { passive: true });
      scrollEl.addEventListener('touchmove', function(e) {
        if (!pulling) return;
        var dist = e.touches[0].clientY - startY;
        if (dist < 0) { pulling = false; return; }
        var progress = Math.min(dist / threshold, 1);
        indicator.classList.add('visible');
        var arrow = document.getElementById('ptr-arrow');
        if (arrow) { arrow.style.transform = 'rotate(' + (progress * 180) + 'deg)'; arrow.style.color = progress >= 1 ? 'var(--blue)' : 'var(--text3)'; }
      }, { passive: true });
      scrollEl.addEventListener('touchend', function(e) {
        if (!pulling) return; pulling = false;
        var dist = e.changedTouches[0].clientY - startY;
        if (dist >= threshold) {
          indicator.innerHTML = '<div class="ptr-spinner spinning"></div>';
          onRefresh(function() { indicator.innerHTML = '<div class="ptr-arrow" id="ptr-arrow">↓</div>'; indicator.classList.remove('visible'); });
        } else { indicator.classList.remove('visible'); }
      });
    }
    function initAutoRefresh(onRefresh) {
      setInterval(function() {
        var expiry = parseInt(localStorage.getItem('siadeel-token-expiry') || '0');
        var bufferMs = 10 * 60 * 1000;
        if (token && Date.now() >= (expiry - bufferMs)) {
          if (typeof google !== 'undefined' && google.accounts) {
            google.accounts.oauth2.initTokenClient({
              client_id: CLIENT_ID, scope: SCOPES,
              callback: function(res) {
                if (!res.error) {
                  token = res.access_token;
                  const expiresAt = Date.now() + (res.expires_in * 1000);
                  localStorage.setItem('siadeel-token', token);
                  localStorage.setItem('siadeel-token-expiry', expiresAt);
                }
              }
            }).requestAccessToken({ prompt: '' });
          }
          return;
        }
        if (!token || Date.now() >= expiry) return;
        onRefresh(function() {});
      }, 5 * 60 * 1000);
    }
  </script>
