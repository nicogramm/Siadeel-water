<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Process Flow - Siadeel Water</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  
  <style>
    :root {
      --bg: #f5f7fa; --text: #0052A3; --blue: #0052A3;
      --shadow-d: #c8d1dc; --shadow-l: #ffffff;
      --neu-out: 8px 8px 16px var(--shadow-d), -6px -6px 12px var(--shadow-l);
    }
    
    body.dark {
      --bg: #1a1f2e; --text: #1a6bbf; 
      --shadow-d: #0f1219; --shadow-l: #2e3547;
    }
    
    * { box-sizing:border-box; margin:0; padding:0; }
    body { 
      font-family:'Inter',sans-serif; background:var(--bg); 
      color:var(--text); transition:background 0.4s; 
    }
    
    .process-page { 
      display:flex; flex-direction:column; 
      height:100vh; width:100%; 
    }
    
    .process-header {
      background:#0052A3; padding:14px 18px;
      display:flex; align-items:center; justify-content:space-between;
      box-shadow:0 3px 10px rgba(0,0,0,0.15);
    }
    
    .process-header h1 {
      font-size:20px; font-weight:700; color:white;
    }
    
    .back-btn {
      width:36px; height:36px; border-radius:10px;
      background:rgba(255,255,255,0.15); border:none;
      color:white; cursor:pointer;
    }
    
    .content {
      flex:1; overflow-y:auto; padding:20px;
      display:grid; grid-template-columns:1fr 1fr; gap:20px;
    }
    
    @media (max-width: 768px) {
      .content { grid-template-columns:1fr; }
    }
    
    .editor-panel, .preview-panel {
      background:var(--bg); border-radius:18px;
      box-shadow:var(--neu-out); padding:20px;
    }
    
    .panel-title {
      font-size:16px; font-weight:700; margin-bottom:16px;
      color:var(--text);
    }
    
    #code-editor {
      width:100%; min-height:400px; padding:16px;
      background:var(--bg); border:none; border-radius:12px;
      font-family:'Courier New',monospace; font-size:13px;
      color:var(--text); resize:vertical;
      box-shadow:inset 5px 5px 10px var(--shadow-d), 
                 inset -4px -4px 9px var(--shadow-l);
    }
    
    .preview-container {
      min-height:400px; padding:20px;
      background:white; border-radius:12px;
      overflow:auto;
    }
    
    .btn-group {
      display:flex; gap:10px; margin-top:16px;
    }
    
    .btn {
      flex:1; padding:12px; border:none; border-radius:12px;
      font-size:14px; font-weight:600; cursor:pointer;
      font-family:'Inter',sans-serif; transition:transform 0.1s;
    }
    
    .btn-primary {
      background:var(--blue); color:white;
      box-shadow:0 4px 12px rgba(0,82,163,0.3);
    }
    
    .btn-secondary {
      background:var(--bg); color:var(--text);
      box-shadow:var(--neu-out);
    }
    
    .btn:active { transform:scale(0.98); }
    
    .templates {
      display:grid; grid-template-columns:repeat(2, 1fr);
      gap:10px; margin-bottom:16px;
    }
    
    .template-btn {
      padding:12px; background:var(--bg); border:none;
      border-radius:12px; box-shadow:var(--neu-out);
      font-size:12px; font-weight:600; color:var(--text);
      cursor:pointer; font-family:'Inter',sans-serif;
    }
    
    .template-btn:active { 
      box-shadow:inset 5px 5px 10px var(--shadow-d), 
                 inset -4px -4px 9px var(--shadow-l);
    }
  </style>
</head>
<body>
  <div class="process-page">
    <div class="process-header">
      <button class="back-btn" onclick="goBack()">←</button>
      <h1>Process Flow Diagrams</h1>
      <div style="width:36px"></div>
    </div>
    
    <div class="content">
      <!-- Editor Panel -->
      <div class="editor-panel">
        <div class="panel-title">📝 Diagram Code</div>
        
        <div class="templates">
          <button class="template-btn" onclick="loadTemplate('basic')">
            🔵 Basic Flow
          </button>
          <button class="template-btn" onclick="loadTemplate('treatment')">
            💧 Water Treatment
          </button>
          <button class="template-btn" onclick="loadTemplate('decision')">
            🔀 Decision Tree
          </button>
          <button class="template-btn" onclick="loadTemplate('cycle')">
            🔄 Cycle Process
          </button>
        </div>
        
        <textarea id="code-editor" placeholder="Enter Mermaid diagram code...">
graph TD
    A[Raw Water Intake] --> B{Quality Test}
    B -->|Pass| C[Filtration]
    B -->|Fail| D[Pre-treatment]
    D --> C
    C --> E[Chlorination]
    E --> F[Storage Tank]
    F --> G[Distribution]
        </textarea>
        
        <div class="btn-group">
          <button class="btn btn-primary" onclick="updatePreview()">
            🔄 Update Preview
          </button>
          <button class="btn btn-secondary" onclick="saveFlow()">
            💾 Save
          </button>
        </div>
      </div>
      
      <!-- Preview Panel -->
      <div class="preview-panel">
        <div class="panel-title">👁️ Live Preview</div>
        <div class="preview-container">
          <div class="mermaid" id="preview">
graph TD
    A[Raw Water Intake] --> B{Quality Test}
    B -->|Pass| C[Filtration]
    B -->|Fail| D[Pre-treatment]
    D --> C
    C --> E[Chlorination]
    E --> F[Storage Tank]
    F --> G[Distribution]
          </div>
        </div>
        
        <div class="btn-group">
          <button class="btn btn-secondary" onclick="exportPNG()">
            📥 Export PNG
          </button>
          <button class="btn btn-secondary" onclick="exportSVG()">
            📥 Export SVG
          </button>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    // Initialize Mermaid
    mermaid.initialize({ 
      startOnLoad: true, 
      theme: 'neutral',
      flowchart: { 
        useMaxWidth: true,
        htmlLabels: true,
        curve: 'basis'
      }
    });
    
    // Theme sync
    const themeChannel = new BroadcastChannel('siadeel-theme-channel');
    themeChannel.onmessage = (event) => {
      if (event.data.type === 'theme-change') {
        document.body.classList.toggle('dark', event.data.isDark);
        mermaid.initialize({ 
          theme: event.data.isDark ? 'dark' : 'neutral' 
        });
        updatePreview();
      }
    };
    
    const isDark = localStorage.getItem('siadeel-theme') === 'dark';
    document.body.classList.toggle('dark', isDark);
    
    // Templates
    const templates = {
      basic: `graph TD
    A[Start] --> B[Process 1]
    B --> C[Process 2]
    C --> D[End]`,
      
      treatment: `graph TD
    A[Raw Water Source] --> B[Screening]
    B --> C[Coagulation]
    C --> D[Sedimentation]
    D --> E[Filtration]
    E --> F[Disinfection]
    F --> G[Storage]
    G --> H[Distribution]`,
      
      decision: `graph TD
    A[Water Sample] --> B{pH Test}
    B -->|pH < 6.5| C[Add Alkali]
    B -->|pH > 8.5| D[Add Acid]
    B -->|6.5-8.5| E[Acceptable]
    C --> F[Re-test]
    D --> F
    F --> E
    E --> G[Next Stage]`,
      
      cycle: `graph LR
    A[Intake] --> B[Treatment]
    B --> C[Storage]
    C --> D[Distribution]
    D --> E[Monitoring]
    E --> A`
    };
    
    function loadTemplate(name) {
      document.getElementById('code-editor').value = templates[name];
      updatePreview();
    }
    
    function updatePreview() {
      const code = document.getElementById('code-editor').value;
      const preview = document.getElementById('preview');
      
      preview.innerHTML = code;
      preview.removeAttribute('data-processed');
      
      mermaid.init(undefined, preview);
    }
    
    async function exportPNG() {
      const svg = document.querySelector('#preview svg');
      if (!svg) {
        alert('Generate preview first!');
        return;
      }
      
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const svgData = new XMLSerializer().serializeToString(svg);
      const img = new Image();
      
      img.onload = () => {
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);
        
        const link = document.createElement('a');
        link.download = `process-flow-${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      };
      
      img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgData)));
    }
    
    function exportSVG() {
      const svg = document.querySelector('#preview svg');
      if (!svg) {
        alert('Generate preview first!');
        return;
      }
      
      const svgData = new XMLSerializer().serializeToString(svg);
      const blob = new Blob([svgData], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      
      const link = document.createElement('a');
      link.download = `process-flow-${Date.now()}.svg`;
      link.href = url;
      link.click();
    }
    
    function saveFlow() {
      // TODO: Save to Google Sheets
      const code = document.getElementById('code-editor').value;
      localStorage.setItem('process-flow-draft', code);
      alert('✅ Saved locally! (Google Sheets integration coming next)');
    }
    
    function goBack() {
      window.location.href = 'index.html';
    }
    
    // Auto-update on load
    updatePreview();
  </script>
</body>
</html>
